<section class="dropdown_container">
    <button class="dropdown_button" type="button"><span class="dropdown_button-text button-text">[dropdownName]</span></button>
    <input
        class="dropdown_input"
        type="hidden"
    >
    <ul class="dropdown_list hidden dNone">
        <li data-value="[key]" class="dropdown_list-element">[value]</li>
    </ul>
</section>
